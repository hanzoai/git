# Hanzo Git — image build + publish (amd64, self-hosted hanzoai pool).
#
# Publishes ghcr.io/hanzoai/git on `v1.*` tags → the semver image tag
# (v1.26.5 → 1.26.5). v1-only, semver-pinned, never :latest (K8s caches floating
# tags). amd64 only — DOKS is all amd64, and the build runs on our self-hosted
# hanzo-build-linux-amd64 ARC pool (NO GitHub-hosted builders).
#
# This is THE release lane. It REPLACES upstream Gitea's release workflows
# (release-tag-version / release-nightly[-snapcraft] / release-tag-rc), which target
# Gitea's own infra we do not have — Namespace.so runners, Docker Hub, the
# ghcr.io/go-gitea/gitea repo, S3 + GPG/cosign secrets — and would fail on every tag
# and every push to main. Removed so exactly one, working publish path exists.
name: Docker Release

on:
  push:
    tags:
      - "v1.*"
      - "!v1*-rc*"
      - "!v1*-dev"
  workflow_dispatch:

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-amd64:
    # hanzoai org pool — ARC routes by runnerScaleSetName, not labels.
    runs-on: hanzo-build-linux-amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history + tags: the Gitea Dockerfile bind-mounts .git to derive the
          # version, and `git describe` needs the tag reachable.
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # GH_PAT (hanzo-dev, write:packages) — the automatic GITHUB_TOKEN is
          # scoped to this repo only, so it cannot write the shared git-cache
          # package nor fetch the private hanzoai/* modules. Same login as
          # hanzoai/iam2 and hanzoai/cloud.
          username: hanzo-dev
          password: ${{ secrets.GH_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hanzoai/git
          # v1.26.5 → 1.26.5. No major/minor floating tags, no latest.
          tags: |
            type=semver,pattern={{version}}
          flavor: |
            latest=false

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          # Embed the release version deterministically (the Dockerfile's ARG
          # GIT_VERSION feeds the Makefile; belt-and-suspenders alongside the .git
          # bind-mount so the binary reports the exact tag).
          build-args: |
            GIT_VERSION=${{ steps.meta.outputs.version }}
          # Mounted into `go mod download` (Dockerfile) to fetch the private
          # hanzoai/* modules over authenticated git. Never lands in the image.
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GH_PAT }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/hanzoai/git-cache:amd64
          cache-to: type=registry,ref=ghcr.io/hanzoai/git-cache:amd64,mode=max
          provenance: false
