# Canonical CI/CD — imports the shared hanzoai/ci reusable workflow. All real
# config (the image build) lives in the repo-root hanzo.yml; this file is just
# the trigger + the import. Runs on the self-hosted arc pool — zero GitHub-hosted
# minutes.
name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  cicd:
    uses: hanzoai/ci/.github/workflows/build.yml@main
    secrets: inherit
